server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    discovery:
      locator:
        enabled: true
        lower-case-service-id: true
    routes:
      - id: usuario-ms
        url: lb://UsuarioMS
        predicates:
          - Path=/api/v1/usuarios/**

      - id: auth-ms
        url: lb://Autenticacion
        predicates:
          - Path=/api/v1/auth/**

      - id: donacion-ms
        url: lb://donacionMS
        predicates:
          - Path=/api/v1/donaciones/**

      - id: fichaSalud-ms
        url: lb://fichaSaludMS
        predicates:
          - Path=/api/v1/fichaSalud/**

      - id: historialAdopcion-ms
        url: lb://HistorialAdopcionMS
        predicates:
          - Path=/api/v1/historial/**

      - id: mascota-ms
        url: lb://mascotaMS
        predicates:
          - Path=/api/v1/mascota/**

      - id: mensajeria-ms
        url: lb://mensajeriaMS
        predicates:
          - Path=/api/v1/mensajes/**

      - id: notificacion-ms
        url: lb://notificacionMS
        predicates:
          - Path=/api/v1/notificaciones/**

      - id: publicacion-ms
        url: lb://publicacionMS
        predicates:
          - Path=/api/v1/publicacion/**

      - id: solicitud-ms
        url: lb://SolicitudMS
        predicates:
          - Path=/api/v1/solicitudes/**

